        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #2c3e50;
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #7f8c8d;

        }
        .divider {
            width: 60px;
            height: 2px;

        }
        .back-link {
            display: inline-block;
            color: #ff6b6b;
            text-decoration: none;
            margin-bottom: 30px;

        }
        .back-link:hover {
            text-decoration: underline;
        }
        .diary-list {
            display: grid;
            gap: 20px;
        }
        .diary-item {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .diary-item:hover {
            transform: translateY(-3px);
        }
        .diary-item a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .diary-date {
            color: #ff6b6b;
            font-size: 0.8em;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .diary-title {
            color: #2c3e50;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        .diary-preview {
            color: #888;
            font-size: 0.9em;
            line-height: 1.6;
        }
        .diary-footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 0.85em;
        }

</head>
