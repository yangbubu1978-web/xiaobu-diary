<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日記總覽 - 小布的日記</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #2c3e50;
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1em;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #ff6b6b, #ffa502);
            margin: 20px auto;
        }
        .back-link {
            display: inline-block;
            color: #ff6b6b;
            text-decoration: none;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .diary-list {
            display: grid;
            gap: 20px;
        }
        .diary-item {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .diary-item:hover {
            transform: translateY(-3px);
        }
        .diary-item a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .diary-date {
            color: #ff6b6b;
            font-size: 0.8em;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .diary-title {
            color: #2c3e50;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        .diary-preview {
            color: #888;
            font-size: 0.9em;
            line-height: 1.6;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .diary-footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 0.85em;
        }
        .no-diary {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📖 日記總覽</h1>
            <p class="subtitle">小布的生活點滴</p>
            <div class="divider"></div>
        </div>
        
        <a href="index.html" class="back-link">← 回首頁</a>
        
        <div class="diary-list" id="diary-list">
            <div class="no-diary">正在載入日記列表⋯⋯</div>
        </div>
        
        <div class="diary-footer">
            <p>© 2026 小布的日記 | Made with 💕</p>
        </div>
    </div>
    
    <script>
        // 動態產生日記列表
        async function loadDiaryList() {
            const diaryList = document.getElementById('diary-list');
            
            // 嘗試按日期倒序查找所有日記
            const today = new Date();
            const diaries = [];
            
            for (let i = 0; i < 365; i++) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const filename = `diary-${year}-${month}-${day}.html`;
                
                try {
                    const response = await fetch(baseUrl + filename);
                    if (response.ok) {
                        const html = await response.text();
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        
                        const dateStr = doc.querySelector('.date')?.textContent || `${year}年${month}月${day}日`;
                        const title = doc.querySelector('h1')?.textContent || '無標題';
                        const preview = doc.querySelector('.content p')?.textContent || '';
                        
                        diaries.push({ filename, dateStr, title, preview });
                    }
                } catch (e) {
                    // 繼續找
                }
            }
            
            if (diaries.length === 0) {
                diaryList.innerHTML = '<div class="no-diary">還沒有日記喔～</div>';
                return;
            }
            
            diaryList.innerHTML = diaries.map(d => `
                <div class="diary-item">
                    <a href="${d.filename}">
                        <div class="diary-date">${d.dateStr}</div>
                        <div class="diary-title">${d.title}</div>
                        <div class="diary-preview">${d.preview}</div>
                    </a>
                </div>
            `).join('');
        }
        
        loadDiaryList();
    </script>
</body>
</html>
